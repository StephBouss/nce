<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="bg-sc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002B8A"/>
      <stop offset="100%" stop-color="#080028"/>
    </linearGradient>
  </defs>

  <rect width="600" height="450" fill="url(#bg-sc)"/>

  <!-- Blueprint grid -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
    <line x1="0" y1="72" x2="600" y2="72"/>
    <line x1="0" y1="144" x2="600" y2="144"/>
    <line x1="0" y1="216" x2="600" y2="216"/>
    <line x1="0" y1="288" x2="600" y2="288"/>
  </g>

  <!-- Hard hat + shield (centered at 300,190) -->
  <g transform="translate(300,185)">
    <!-- Hard hat dome -->
    <path d="M-70,10 Q-70,-80 0,-90 Q70,-80 70,10 Z"
          fill="rgba(255,152,0,0.15)" stroke="#FF9800" stroke-width="3" stroke-linejoin="round"/>
    <!-- Hard hat brim -->
    <rect x="-90" y="8" width="180" height="16" rx="5"
          fill="rgba(255,152,0,0.1)" stroke="#FF9800" stroke-width="2.5"/>
    <!-- Hard hat inner band -->
    <line x1="-55" y1="10" x2="55" y2="10" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Vent slots on hat -->
    <line x1="-20" y1="-55" x2="-20" y2="-38" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-60" x2="0" y2="-43" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="-55" x2="20" y2="-38" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round"/>

    <!-- Shield below hat -->
    <g transform="translate(0,65)">
      <!-- Shield outline -->
      <path d="M0,-55 L50,-40 L50,10 Q50,50 0,65 Q-50,50 -50,10 L-50,-40 Z"
            fill="rgba(29,79,179,0.25)" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linejoin="round"/>
      <!-- Checkmark inside shield -->
      <polyline points="-22,5 -8,20 28,-18" fill="none" stroke="#FF9800" stroke-width="4"
                stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Bottom strip -->
  <rect x="0" y="362" width="600" height="88" fill="rgba(0,0,0,0.52)"/>
  <rect x="0" y="362" width="5" height="88" fill="#FF9800"/>
  <text x="22" y="390" fill="#FF9800" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="3">SÉCURITÉ</text>
  <text x="22" y="416" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="10">Photo de réalisation à intégrer</text>
  <text x="578" y="416" text-anchor="end" fill="rgba(255,152,0,0.45)" font-family="monospace" font-size="10" letter-spacing="1">NCE SARL</text>
</svg>
