<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="bg-lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001E70"/>
      <stop offset="100%" stop-color="#000C38"/>
    </linearGradient>
  </defs>

  <rect width="600" height="450" fill="url(#bg-lg)"/>

  <!-- Blueprint grid -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
    <line x1="0" y1="72" x2="600" y2="72"/>
    <line x1="0" y1="144" x2="600" y2="144"/>
    <line x1="0" y1="216" x2="600" y2="216"/>
    <line x1="0" y1="288" x2="600" y2="288"/>
  </g>

  <!-- Truck (centered at 295,195) -->
  <g transform="translate(295,200)">
    <!-- Trailer body -->
    <rect x="-145" y="-48" width="170" height="88" rx="3" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
    <!-- Trailer vertical stripes (cargo indication) -->
    <line x1="-95" y1="-48" x2="-95" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="-45" y1="-48" x2="-45" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="5" y1="-48" x2="5" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- NCE label on trailer -->
    <text x="-80" y="-5" text-anchor="middle" fill="rgba(255,152,0,0.55)" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="2">NCE</text>
    <!-- Cab -->
    <rect x="25" y="-48" width="75" height="88" rx="5" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5"/>
    <!-- Cab window -->
    <rect x="34" y="-38" width="50" height="38" rx="3" fill="rgba(255,152,0,0.18)" stroke="#FF9800" stroke-width="2"/>
    <!-- Cab door line -->
    <line x1="60" y1="-48" x2="60" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Cab door handle -->
    <line x1="52" y1="8" x2="52" y2="18" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
    <!-- Exhaust stack -->
    <rect x="90" y="-70" width="8" height="28" rx="2" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <!-- Exhaust puff -->
    <circle cx="94" cy="-78" r="5" fill="rgba(255,255,255,0.12)"/>
    <circle cx="100" cy="-85" r="4" fill="rgba(255,255,255,0.08)"/>
    <!-- Wheels -->
    <circle cx="-110" cy="48" r="22" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2.5"/>
    <circle cx="-110" cy="48" r="11" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <circle cx="-55" cy="48" r="22" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2.5"/>
    <circle cx="-55" cy="48" r="11" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <circle cx="65" cy="48" r="22" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2.5"/>
    <circle cx="65" cy="48" r="11" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <!-- Road -->
    <line x1="-175" y1="70" x2="175" y2="70" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <!-- Road markings -->
    <line x1="-130" y1="70" x2="-90" y2="70" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
    <line x1="-50" y1="70" x2="-10" y2="70" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
    <line x1="30" y1="70" x2="70" y2="70" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
    <!-- Headlight -->
    <circle cx="98" cy="-15" r="6" fill="rgba(255,200,80,0.5)" stroke="#FF9800" stroke-width="1.5"/>
  </g>

  <!-- Bottom strip -->
  <rect x="0" y="362" width="600" height="88" fill="rgba(0,0,0,0.52)"/>
  <rect x="0" y="362" width="5" height="88" fill="#FF9800"/>
  <text x="22" y="390" fill="#FF9800" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="3">LOGISTIQUE</text>
  <text x="22" y="416" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="10">Photo de réalisation à intégrer</text>
  <text x="578" y="416" text-anchor="end" fill="rgba(255,152,0,0.45)" font-family="monospace" font-size="10" letter-spacing="1">NCE SARL</text>
</svg>
