<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg-team" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#002B8A"/>
      <stop offset="60%" stop-color="#001560"/>
      <stop offset="100%" stop-color="#000A30"/>
    </linearGradient>
    <linearGradient id="vest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E68000"/>
    </linearGradient>
    <linearGradient id="vest2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E68000"/>
      <stop offset="100%" stop-color="#CC7000"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,43,138,0.0)"/>
      <stop offset="100%" stop-color="rgba(0,43,138,0.3)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-team)"/>

  <!-- Construction site background elements -->
  <!-- Sky gradient overlay -->
  <rect width="800" height="300" fill="url(#sky)"/>

  <!-- Building silhouette (background, left) -->
  <g fill="rgba(0,0,0,0.25)" stroke="rgba(255,255,255,0.08)" stroke-width="1">
    <rect x="30" y="120" width="90" height="320"/>
    <rect x="40" y="100" width="70" height="30"/>
    <!-- windows -->
    <rect x="50" y="140" width="15" height="15" fill="rgba(255,152,0,0.15)"/>
    <rect x="80" y="140" width="15" height="15" fill="rgba(255,152,0,0.08)"/>
    <rect x="50" y="175" width="15" height="15" fill="rgba(255,255,255,0.06)"/>
    <rect x="80" y="175" width="15" height="15" fill="rgba(255,152,0,0.12)"/>
    <rect x="50" y="210" width="15" height="15" fill="rgba(255,255,255,0.06)"/>
    <rect x="80" y="210" width="15" height="15" fill="rgba(255,255,255,0.04)"/>
  </g>

  <!-- Crane silhouette (background, right) -->
  <g stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none">
    <line x1="680" y1="440" x2="680" y2="60"/>
    <line x1="680" y1="60" x2="750" y2="60"/>
    <line x1="680" y1="60" x2="650" y2="90"/>
    <line x1="720" y1="60" x2="720" y2="100" stroke-dasharray="4,4"/>
    <line x1="750" y1="60" x2="750" y2="110" stroke-dasharray="4,4"/>
  </g>

  <!-- Ground / floor line -->
  <rect x="0" y="460" width="800" height="140" fill="rgba(0,0,0,0.3)"/>
  <line x1="0" y1="460" x2="800" y2="460" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- === PERSON 1 (left, male) === -->
  <g transform="translate(215,290)">
    <!-- Legs (dark trousers) -->
    <rect x="-18" y="95" width="16" height="75" rx="5" fill="#1a1a2e"/>
    <rect x="4" y="95" width="16" height="75" rx="5" fill="#1a1a2e"/>
    <!-- Boots -->
    <rect x="-20" y="162" width="20" height="12" rx="3" fill="#111"/>
    <rect x="2" y="162" width="20" height="12" rx="3" fill="#111"/>
    <!-- Vest/body (orange) -->
    <rect x="-24" y="20" width="50" height="80" rx="6" fill="url(#vest)"/>
    <!-- Reflective stripes on vest -->
    <rect x="-24" y="50" width="50" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
    <rect x="-24" y="72" width="50" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
    <!-- NCE logo on vest (simplified) -->
    <text x="1" y="44" text-anchor="middle" fill="white" font-family="monospace" font-size="7" font-weight="bold" opacity="0.9">NCE</text>
    <!-- Shirt collar -->
    <rect x="-10" y="14" width="22" height="12" rx="2" fill="#1D4FB3"/>
    <!-- Arm left -->
    <rect x="-38" y="24" width="16" height="55" rx="6" fill="url(#vest)"/>
    <!-- Arm right -->
    <rect x="24" y="24" width="16" height="55" rx="6" fill="url(#vest)"/>
    <!-- Glove left -->
    <ellipse cx="-30" cy="82" rx="10" ry="7" fill="#2a2a2a"/>
    <!-- Glove right (holding clipboard) -->
    <ellipse cx="32" cy="82" rx="10" ry="7" fill="#2a2a2a"/>
    <!-- Clipboard -->
    <rect x="30" y="70" width="25" height="32" rx="2" fill="rgba(255,255,255,0.85)"/>
    <rect x="33" y="73" width="19" height="2" rx="1" fill="#ccc"/>
    <rect x="33" y="78" width="19" height="2" rx="1" fill="#ccc"/>
    <rect x="33" y="83" width="14" height="2" rx="1" fill="#ccc"/>
    <rect x="33" y="88" width="11" height="2" rx="1" fill="#ccc"/>
    <!-- Neck -->
    <rect x="-8" y="4" width="18" height="14" rx="4" fill="#5a3a2a"/>
    <!-- Head (dark skin) -->
    <ellipse cx="1" cy="-10" rx="22" ry="24" fill="#4a2f1f"/>
    <!-- Face features -->
    <ellipse cx="-7" cy="-12" rx="4" ry="4" fill="#fff" opacity="0.9"/>
    <ellipse cx="9" cy="-12" rx="4" ry="4" fill="#fff" opacity="0.9"/>
    <ellipse cx="-7" cy="-11" rx="2" ry="2" fill="#1a0a0a"/>
    <ellipse cx="9" cy="-11" rx="2" ry="2" fill="#1a0a0a"/>
    <!-- Smile -->
    <path d="M-5,2 Q1,8 7,2" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <!-- Hard hat -->
    <path d="M-25,-24 Q-22,-55 1,-60 Q24,-55 27,-24 Z" fill="#FF9800" stroke="#E06000" stroke-width="1.5"/>
    <rect x="-30" y="-26" width="62" height="9" rx="4" fill="#FF9800" stroke="#E06000" stroke-width="1"/>
  </g>

  <!-- === PERSON 2 (center, female) === -->
  <g transform="translate(400,265)">
    <!-- Legs -->
    <rect x="-16" y="100" width="15" height="80" rx="5" fill="#1a1a2e"/>
    <rect x="3" y="100" width="15" height="80" rx="5" fill="#1a1a2e"/>
    <!-- Boots -->
    <rect x="-20" y="172" width="21" height="12" rx="3" fill="#111"/>
    <rect x="1" y="172" width="21" height="12" rx="3" fill="#111"/>
    <!-- Vest (orange) -->
    <rect x="-22" y="22" width="46" height="82" rx="6" fill="url(#vest2)"/>
    <!-- Reflective stripes -->
    <rect x="-22" y="52" width="46" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
    <rect x="-22" y="74" width="46" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
    <!-- NCE -->
    <text x="1" y="46" text-anchor="middle" fill="white" font-family="monospace" font-size="7" font-weight="bold" opacity="0.9">NCE</text>
    <!-- Shirt -->
    <rect x="-9" y="16" width="20" height="12" rx="2" fill="#1D4FB3"/>
    <!-- Arms (bent, taking notes) -->
    <rect x="-36" y="26" width="16" height="50" rx="6" fill="url(#vest2)" transform="rotate(20,-28,51)"/>
    <rect x="22" y="26" width="16" height="45" rx="6" fill="url(#vest2)" transform="rotate(-15,30,48)"/>
    <!-- Hands -->
    <ellipse cx="-28" cy="78" rx="9" ry="7" fill="#3a2010"/>
    <ellipse cx="30" cy="74" rx="9" ry="7" fill="#3a2010"/>
    <!-- Tablet/notepad -->
    <rect x="20" y="55" width="28" height="36" rx="3" fill="rgba(255,255,255,0.9)"/>
    <rect x="23" y="59" width="22" height="2" rx="1" fill="#bbb"/>
    <rect x="23" y="64" width="22" height="2" rx="1" fill="#bbb"/>
    <rect x="23" y="69" width="17" height="2" rx="1" fill="#bbb"/>
    <!-- Neck -->
    <rect x="-8" y="6" width="17" height="14" rx="4" fill="#3a2010"/>
    <!-- Head -->
    <ellipse cx="1" cy="-12" rx="21" ry="23" fill="#3a2010"/>
    <!-- Hair (female, short natural) -->
    <ellipse cx="1" cy="-28" rx="21" ry="10" fill="#1a0a00"/>
    <!-- Eyes -->
    <ellipse cx="-7" cy="-14" rx="4" ry="4" fill="#fff" opacity="0.9"/>
    <ellipse cx="9" cy="-14" rx="4" ry="4" fill="#fff" opacity="0.9"/>
    <ellipse cx="-7" cy="-13" rx="2" ry="2" fill="#1a0a0a"/>
    <ellipse cx="9" cy="-13" rx="2" ry="2" fill="#1a0a0a"/>
    <!-- Smile -->
    <path d="M-5,0 Q1,6 7,0" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <!-- Hard hat (blue — DG / responsable) -->
    <path d="M-24,-26 Q-21,-56 1,-62 Q23,-56 26,-26 Z" fill="#1D4FB3" stroke="#0A2A80" stroke-width="1.5"/>
    <rect x="-29" y="-28" width="60" height="9" rx="4" fill="#1D4FB3" stroke="#0A2A80" stroke-width="1"/>
    <!-- NCE on hat -->
    <text x="1" y="-38" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="monospace" font-size="5" font-weight="bold">NCE</text>
  </g>

  <!-- === PERSON 3 (right, male) === -->
  <g transform="translate(585,295)">
    <!-- Legs -->
    <rect x="-17" y="92" width="15" height="72" rx="5" fill="#1a1a2e"/>
    <rect x="3" y="92" width="15" height="72" rx="5" fill="#1a1a2e"/>
    <!-- Boots -->
    <rect x="-21" y="156" width="21" height="12" rx="3" fill="#111"/>
    <rect x="1" y="156" width="21" height="12" rx="3" fill="#111"/>
    <!-- Vest -->
    <rect x="-23" y="18" width="48" height="78" rx="6" fill="url(#vest)"/>
    <!-- Stripes -->
    <rect x="-23" y="48" width="48" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
    <rect x="-23" y="70" width="48" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
    <!-- NCE -->
    <text x="1" y="42" text-anchor="middle" fill="white" font-family="monospace" font-size="7" font-weight="bold" opacity="0.9">NCE</text>
    <!-- Shirt -->
    <rect x="-9" y="12" width="20" height="12" rx="2" fill="#1D4FB3"/>
    <!-- Arms -->
    <rect x="-37" y="22" width="16" height="52" rx="6" fill="url(#vest)" transform="rotate(-10,-29,48)"/>
    <rect x="23" y="22" width="16" height="52" rx="6" fill="url(#vest)" transform="rotate(10,31,48)"/>
    <!-- Hands -->
    <ellipse cx="-30" cy="76" rx="9" ry="7" fill="#2a1a0a"/>
    <ellipse cx="32" cy="76" rx="9" ry="7" fill="#2a1a0a"/>
    <!-- Neck -->
    <rect x="-8" y="4" width="18" height="14" rx="4" fill="#3a2010"/>
    <!-- Head -->
    <ellipse cx="1" cy="-10" rx="21" ry="23" fill="#3a2010"/>
    <!-- Eyes -->
    <ellipse cx="-7" cy="-12" rx="4" ry="4" fill="#fff" opacity="0.9"/>
    <ellipse cx="9" cy="-12" rx="4" ry="4" fill="#fff" opacity="0.9"/>
    <ellipse cx="-7" cy="-11" rx="2" ry="2" fill="#1a0a0a"/>
    <ellipse cx="9" cy="-11" rx="2" ry="2" fill="#1a0a0a"/>
    <!-- Hard hat (orange) -->
    <path d="M-24,-24 Q-21,-54 1,-59 Q23,-54 26,-24 Z" fill="#FF9800" stroke="#E06000" stroke-width="1.5"/>
    <rect x="-29" y="-26" width="60" height="9" rx="4" fill="#FF9800" stroke="#E06000" stroke-width="1"/>
  </g>

  <!-- Orange ground accent -->
  <rect x="0" y="455" width="800" height="4" fill="#FF9800" opacity="0.6"/>

  <!-- Bottom info band -->
  <rect x="0" y="510" width="800" height="90" fill="rgba(0,0,0,0.55)"/>
  <rect x="0" y="510" width="6" height="90" fill="#FF9800"/>
  <text x="24" y="545" fill="white" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="1">Équipe NCE SARL</text>
  <text x="24" y="568" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="11">Photo officielle de l'équipe à intégrer</text>
  <text x="780" y="568" text-anchor="end" fill="rgba(255,152,0,0.5)" font-family="monospace" font-size="10" letter-spacing="1">NCE SARL · LIBREVILLE</text>
</svg>
